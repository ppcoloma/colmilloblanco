<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Colmillo Blanco</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0A0705;--black2:#130E08;--black3:#1A1208;
  --gold:#D4AF37;--gold2:#C9952A;--gold3:#F0D060;
  --gold-dim:rgba(212,175,55,0.12);--gold-border:rgba(212,175,55,0.25);
  --cream:#FAF6EE;--cream2:#EDE0C8;--muted:#B89A6A;
}
body{font-family:'DM Sans',sans-serif;background:#1A1208;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.widget{width:100%;max-width:420px;background:var(--black2);border-radius:20px;overflow:hidden;border:1px solid var(--gold-border);display:flex;flex-direction:column;height:720px;box-shadow:0 0 60px rgba(212,175,55,0.06),0 20px 60px rgba(0,0,0,0.6)}

/* Header con logo */
.header{background:var(--black);padding:12px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid var(--gold-border)}
.header-logo{height:48px;width:auto;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(212,175,55,0.3))}
.logo-fallback{font-family:'Cinzel',serif;font-size:17px;font-weight:600;line-height:1.1}
.logo-fallback .l1{color:var(--gold3);display:block}
.logo-fallback .l2{color:var(--gold);display:block}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px}
.dot{width:6px;height:6px;background:#5CC878;border-radius:50%;display:inline-block;margin-right:4px}
.status-txt{font-size:11px;color:var(--muted)}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:3px}.chat::-webkit-scrollbar-thumb{background:var(--gold-border);border-radius:2px}
.msg{display:flex;gap:8px;align-items:flex-end;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{flex-direction:row}.msg.user{flex-direction:row-reverse}
.av{width:26px;height:26px;background:var(--black);border:1px solid var(--gold-border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.bubble{max-width:83%;padding:10px 13px;border-radius:16px;font-size:13.5px;line-height:1.6}
.msg.bot .bubble{background:var(--black3);color:var(--cream);border:1px solid rgba(212,175,55,0.12);border-bottom-left-radius:3px}
.msg.user .bubble{background:var(--gold2);color:var(--black);border-bottom-right-radius:3px;font-weight:500}
.bubble b{font-weight:600;color:var(--gold3)}
.msg.user .bubble b{color:var(--black2)}

/* Raza card */
.raza-card{background:var(--black);border:1px solid var(--gold-border);border-radius:14px;padding:14px;margin:2px 0}
.raza-title{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);font-weight:600;margin-bottom:10px}
.raza-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.raza-item{background:var(--gold-dim);border-radius:8px;padding:8px 10px;border:1px solid rgba(212,175,55,0.1)}
.raza-item .ri-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px}
.raza-item .ri-val{font-size:12.5px;color:var(--cream);font-weight:500}
.raza-tip{margin-top:10px;background:rgba(212,175,55,0.06);border-left:2px solid var(--gold2);border-radius:0 8px 8px 0;padding:8px 10px;font-size:12.5px;color:var(--cream2);line-height:1.5}

/* Quick replies */
.qrs{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 8px}
.qr{background:transparent;border:1px solid var(--gold-border);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:12.5px;padding:7px 13px;border-radius:20px;cursor:pointer;transition:all 0.18s}
.qr:hover{background:var(--gold);color:var(--black);border-color:var(--gold)}

/* Upload */
.upload-zone{margin:4px 14px 8px;border:1px dashed var(--gold-border);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--gold-dim)}
.upload-zone:hover{border-color:var(--gold)}
.upload-zone input{display:none}
.upload-zone p{font-size:12.5px;color:var(--muted);margin-top:6px}

/* Cards */
.fc{margin:4px 14px 8px}
.result-card{background:var(--black);border:1px solid var(--gold-border);border-radius:14px;padding:16px}
.rc-title{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--gold);margin-bottom:12px}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(212,175,55,0.08)}
.rrow:last-child{border:none}
.rlabel{font-size:11.5px;color:var(--muted)}
.rval{font-size:13px;font-weight:500;color:var(--cream)}
.rval.hi{color:var(--gold)!important;font-size:14px}
.badge{background:rgba(212,175,55,0.15);color:var(--gold);font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid var(--gold-border)}
.prod-card{background:var(--black);border:1px solid var(--gold-border);border-radius:14px;padding:12px;display:flex;gap:12px;align-items:center;margin-top:8px}
.prod-info h4{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);font-weight:600;margin-bottom:3px}
.prod-info p{font-size:11.5px;color:var(--muted);line-height:1.4}
.prod-badges{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.pbadge{background:rgba(212,175,55,0.1);border:1px solid var(--gold-border);color:var(--gold);font-size:10px;padding:2px 7px;border-radius:10px}

/* Mapa */
.map-card{background:var(--black);border:1px solid var(--gold-border);border-radius:14px;overflow:hidden;margin-top:8px}
.map-card iframe{width:100%;height:220px;border:none;display:block}
.map-footer{padding:8px 12px;font-size:11.5px;color:var(--muted);text-align:center}
.map-footer a{color:var(--gold);text-decoration:none}

/* Form */
.form-card{background:var(--black);border:1px solid var(--gold-border);border-radius:14px;padding:16px;margin-top:8px}
.form-title{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);margin-bottom:12px;font-weight:600}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.frow.full{grid-template-columns:1fr}
.ff{display:flex;flex-direction:column;gap:3px}
.ff label{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.06em}
.ff input,.ff select{background:var(--black2);border:1px solid var(--gold-border);border-radius:8px;padding:8px 11px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--cream);outline:none;transition:border 0.2s}
.ff input::placeholder{color:var(--muted)}
.ff input:focus,.ff select:focus{border-color:var(--gold)}
.ff select option{background:var(--black2);color:var(--cream)}
.contact-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.contact-opt{background:var(--black2);border:1px solid var(--gold-border);border-radius:8px;padding:8px 10px;cursor:pointer;text-align:center;transition:all 0.2s}
.contact-opt.active{border-color:var(--gold);background:var(--gold-dim)}
.contact-opt p{font-size:11px;color:var(--muted);margin-top:2px}
.contact-opt h5{font-size:13px;color:var(--cream);font-weight:500}
.btn{width:100%;background:var(--gold2);color:var(--black);border:none;border-radius:10px;padding:11px;font-family:'Cinzel',serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px;transition:background 0.2s;letter-spacing:0.04em}
.btn:hover{background:var(--gold3)}

/* Input bar */
.ibar{padding:10px 14px;border-top:1px solid var(--gold-border);display:flex;gap:8px;align-items:center;flex-shrink:0;background:var(--black)}
.ibar input{flex:1;background:var(--black3);border:1px solid var(--gold-border);border-radius:20px;padding:9px 15px;font-size:13.5px;font-family:'DM Sans',sans-serif;color:var(--cream);outline:none}
.ibar input::placeholder{color:var(--muted)}
.ibar input:focus{border-color:var(--gold)}
.sbtn{width:36px;height:36px;background:var(--gold2);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s}
.sbtn:hover{background:var(--gold3)}
.sbtn svg{width:15px;height:15px;fill:var(--black)}
.typing{display:flex;gap:4px;padding:10px 13px;background:var(--black3);border-radius:16px;border-bottom-left-radius:3px;border:1px solid rgba(212,175,55,0.1);width:50px}
.typing span{width:6px;height:6px;background:var(--gold2);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.hidden{display:none!important}
.img-preview{max-width:180px;border-radius:10px;margin-top:4px;border:1px solid var(--gold-border)}
</style>
</head>
<body>
<div class="widget">
  <!-- Header con logo -->
  <div class="header">
    <img class="header-logo"
      src="https://colmilloblanco.cl/wp-content/uploads/2023/logo-colmillo-blanco.png"
      onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'"
      alt="Colmillo Blanco">
    <div id="logo-fallback" style="display:none">
      <div class="logo-fallback"><span class="l1">Colmillo</span><span class="l2">Blanco</span></div>
      <div class="logo-sub">Nutrición Ancestral</div>
    </div>
    <div style="margin-left:auto;text-align:right">
      <div class="status-txt"><span class="dot"></span>Asistente activo</div>
      <div class="status-txt" style="font-size:10px;margin-top:2px">Experto en perros</div>
    </div>
  </div>

  <div class="chat" id="chat"></div>
  <div id="qrs" class="qrs hidden"></div>
  <div id="upzone" class="upload-zone hidden">
    <label for="fileinput" style="cursor:pointer;display:block">
      <div style="font-size:28px">📸</div>
      <p>Sube una foto de tu perro</p>
      <p style="font-size:11px;margin-top:2px;color:#6a5030">JPG o PNG · máx 5MB</p>
    </label>
    <input type="file" id="fileinput" accept="image/*">
  </div>
  <div id="fc" class="fc hidden"></div>
  <div class="ibar">
    <input id="inp" type="text" placeholder="Escribe tu pregunta...">
    <button class="sbtn" onclick="send()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
  </div>
</div>

<script>
const BACKEND = 'https://colmilloblanco.vercel.app/api/chat';
const MAPS_URL = 'https://www.google.com/maps/d/embed?mid=11MoJFAJdZeSkaFODv7AbFiWIVHk6lf0';
const MAPS_FULL = 'https://www.google.com/maps/d/u/0/edit?mid=11MoJFAJdZeSkaFODv7AbFiWIVHk6lf0';

// ── TABLA OFICIAL ─────────────────────────────────────────────────────────
const TABLA={
  cachorro:{rangos:[
    {min:0,max:5,vals:['87-290','50-165','45-130']},
    {min:5,max:10,vals:['290-480','165-275','130-215']},
    {min:10,max:20,vals:['480-710','275-465','215-365']},
    {min:20,max:40,vals:['710-765','465-595','365-596']},
    {min:40,max:999,vals:['595+','595+','595+']}
  ]},
  adulto:{rangos:[
    {min:0,max:5,v:'30-105'},{min:5,max:10,v:'105-175'},{min:10,max:20,v:'175-315'},
    {min:20,max:30,v:'315-565'},{min:30,max:45,v:'565-715'},{min:45,max:999,v:'715+'}
  ]},
  senior:{rangos:[
    {min:0,max:5,v:'75'},{min:5,max:10,v:'75-145'},{min:10,max:20,v:'145-295'},
    {min:20,max:30,v:'295-445'},{min:30,max:45,v:'445-595'},{min:45,max:999,v:'595+'}
  ]}
};
function getCat(a){return a<1?'cachorro':a>=7?'senior':'adulto';}
function getFase(a){const m=a*12;return m<=4?0:m<=8?1:2;}
function midVal(s){if(!s)return 0;if(s.includes('+'))return parseInt(s);if(s.includes('-')){const p=s.split('-').map(Number);return Math.round((p[0]+p[1])/2);}return parseInt(s)||0;}
function calcFood(w,age,activity){
  const cat=getCat(age);const t=TABLA[cat];
  const row=t.rangos.find(r=>w>r.min&&w<=r.max)||t.rangos[t.rangos.length-1];
  let ds=cat==='cachorro'?row.vals[getFase(age)]:row.v;
  let mid=midVal(ds);
  // Ajuste por actividad
  if(activity==='alta') mid=Math.round(mid*1.2);
  else if(activity==='baja') mid=Math.round(mid*0.85);
  const bag20=mid>0?Math.round(20000/mid):null;
  const monthly=Math.round(mid*30);
  return{cat,label:cat==='cachorro'?'Cachorro':cat==='senior'?'Senior (7+ años)':'Adulto',dailyStr:activity&&activity!=='normal'?`~${mid}`:ds,mid,bag20,monthly};
}

// ── INFO DE RAZAS ─────────────────────────────────────────────────────────
const RAZAS={
  'golden retriever':{tam:'Grande',peso:'25–34 kg',energia:'⚡⚡⚡⚡ Muy alta',pelo:'Largo, cepillado 3x/semana',vida:'10–12 años',tip:'Son muy golosos — mide la ración con exactitud para evitar sobrepeso.'},
  'golden':{tam:'Grande',peso:'25–34 kg',energia:'⚡⚡⚡⚡ Muy alta',pelo:'Largo, cepillado 3x/semana',vida:'10–12 años',tip:'Son muy golosos — mide la ración con exactitud para evitar sobrepeso.'},
  'labrador':{tam:'Grande',peso:'25–36 kg',energia:'⚡⚡⚡⚡ Muy alta',pelo:'Corto, fácil mantención',vida:'10–12 años',tip:'Propensos a obesidad. Divide en 2 comidas y evita premios extra.'},
  'bulldog':{tam:'Mediano',peso:'18–25 kg',energia:'⚡⚡ Baja',pelo:'Corto, limpiar pliegues semanalmente',vida:'8–10 años',tip:'Sensibles al calor. Alimenta en horarios frescos del día.'},
  'poodle':{tam:'Variable',peso:'3–30 kg',energia:'⚡⚡⚡ Alta',pelo:'Rizado, corte cada 6–8 semanas',vida:'12–15 años',tip:'Muy inteligentes. Aprenden rutinas de alimentación rápidamente.'},
  'husky':{tam:'Grande',peso:'16–27 kg',energia:'⚡⚡⚡⚡⚡ Extrema',pelo:'Doble capa, muda 2x/año',vida:'12–15 años',tip:'Necesitan ejercicio intenso diario o pueden perder el apetito.'},
  'beagle':{tam:'Mediano',peso:'9–11 kg',energia:'⚡⚡⚡ Alta',pelo:'Corto, baja mantención',vida:'12–15 años',tip:'Muy glotones — mide la ración con precisión y no dejes comida libre.'},
  'chihuahua':{tam:'Mini',peso:'1.5–3 kg',energia:'⚡⚡⚡ Alta',pelo:'Corto o largo según variedad',vida:'14–16 años',tip:'Estómago pequeño — divide en 3 comidas pequeñas al día.'},
  'rottweiler':{tam:'Grande',peso:'35–60 kg',energia:'⚡⚡⚡ Alta',pelo:'Corto, baja mantención',vida:'8–10 años',tip:'Necesitan alta proteína para mantener masa muscular. Colmillo Blanco es ideal.'},
  'border collie':{tam:'Mediano',peso:'14–20 kg',energia:'⚡⚡⚡⚡⚡ Extrema',pelo:'Medio/largo, cepillado 2x/semana',vida:'12–15 años',tip:'El más inteligente. Sin ejercicio suficiente puede desarrollar ansiedad.'},
  'schnauzer':{tam:'Variable',peso:'4–20 kg',energia:'⚡⚡⚡ Alta',pelo:'Áspero, requiere stripping 2x/año',vida:'13–16 años',tip:'Propensos a cálculos renales. Hidratación constante es clave.'},
  'boxer':{tam:'Grande',peso:'22–32 kg',energia:'⚡⚡⚡⚡ Muy alta',pelo:'Corto, baja mantención',vida:'9–12 años',tip:'Aliméntalo despacio para evitar gases y torsión gástrica.'},
  'dachshund':{tam:'Pequeño',peso:'7–15 kg',energia:'⚡⚡⚡ Alta',pelo:'Variable según variedad',vida:'12–16 años',tip:'Espalda delicada — mantener el peso ideal es crítico para su salud.'},
  'pastor alemán':{tam:'Grande',peso:'22–40 kg',energia:'⚡⚡⚡⚡ Muy alta',pelo:'Doble capa, cepillado semanal',vida:'9–13 años',tip:'Alta demanda de proteína. Colmillo Blanco con 29% proteína es ideal.'},
  'cocker':{tam:'Mediano',peso:'9–14 kg',energia:'⚡⚡⚡ Alta',pelo:'Largo y sedoso, cepillado diario',vida:'12–15 años',tip:'Propensos a infecciones de oído. Revisión semanal recomendada.'},
  'shih tzu':{tam:'Pequeño',peso:'4–7 kg',energia:'⚡⚡ Moderada',pelo:'Largo, cepillado diario',vida:'10–16 años',tip:'Sensibles a dietas de baja calidad. La proteína animal les sienta muy bien.'},
  'quiltro':{tam:'Variable',peso:'Variable',energia:'⚡⚡⚡ Alta',pelo:'Variable',vida:'12–15 años',tip:'Los quiltros son muy resistentes y saludables. Alimentación balanceada es todo lo que necesitan.'},
  'mestizo':{tam:'Variable',peso:'Variable',energia:'⚡⚡⚡ Alta',pelo:'Variable',vida:'12–15 años',tip:'Los mestizos suelen tener excelente salud. Ajusta la ración según su peso real.'},
};
function getRazaInfo(breed){
  if(!breed)return null;
  const key=breed.toLowerCase().trim();
  return RAZAS[key]||Object.entries(RAZAS).find(([k])=>key.includes(k)||k.includes(key))?.[1]||null;
}

// ── FAQ PREDEFINIDAS ──────────────────────────────────────────────────────
const FAQ=[
  {keys:['tóxico','veneno','peligro','no puede comer','malo para'],resp:'🚫 <b>Alimentos tóxicos para perros:</b> chocolate, uvas y pasas, cebolla, ajo, aguacate, xilitol (edulcorante artificial), macadamia y alcohol. ¡Mantenlos siempre fuera de su alcance!'},
  {keys:['baño','bañar','shampoo'],resp:'🛁 En general cada <b>3–4 semanas</b> es suficiente. Razas de pelo largo pueden necesitar cada 2 semanas. Usa siempre shampoo neutro para mascotas, nunca shampoo humano.'},
  {keys:['uña','cortar uña','garras'],resp:'✂️ Las uñas se cortan cada <b>3–4 semanas</b>. Si escuchas que suenan al caminar en piso duro, ya es hora. Corta solo la punta, evitando la zona rosada que tiene vasos sanguíneos.'},
  {keys:['vacuna','vacunación','vacunar'],resp:'💉 Las vacunas básicas son: <b>Séxtuple</b> (parvovirus, moquillo, hepatitis) y <b>Rabia</b>. Cachorros desde las 6–8 semanas, luego refuerzos anuales. Consulta a tu veterinario para el calendario exacto.'},
  {keys:['cachorro','cuándo cambiar','adulto cuándo'],resp:'🐶 El cambio de cachorro a adulto depende del tamaño: razas pequeñas a los <b>10–12 meses</b>, medianas a los <b>12 meses</b>, grandes a los <b>18–24 meses</b>. Colmillo Blanco es multi-etapas, vale para todas las edades.'},
  {keys:['no quiere comer','no come','perdió el apetito'],resp:'😟 Si tu perro no quiere comer más de <b>2 días</b>, consulta al veterinario. Causas comunes: estrés, calor excesivo o cambio de alimento muy brusco. Para cambiar de alimento, hazlo gradualmente en 7–10 días.'},
  {keys:['sobrepeso','gordo','obeso','adelgazar'],resp:'⚖️ Presiona las costillas suavemente — deberías sentirlas sin ver grasa excesiva. Si hay sobrepeso, <b>reduce un 20% la ración</b> y aumenta el ejercicio. Divide en 2 comidas y elimina premios extra.'},
  {keys:['agua','hidratación','cuánta agua'],resp:'💧 Un perro necesita aproximadamente <b>50–60 ml de agua por kilo</b> al día. Siempre agua fresca disponible. En verano o después del ejercicio la necesidad aumenta.'},
  {keys:['cambiar alimento','cambio de comida','transición','mezclar alimento'],resp:'🔄 Cambia gradualmente en <b>7–10 días</b>: días 1–3: 75% antiguo + 25% Colmillo Blanco. Días 4–6: 50/50. Días 7–9: 25% antiguo + 75% CB. Día 10: 100% Colmillo Blanco.'},
  {keys:['colmillo blanco','ingredientes','composición','proteína'],resp:'🐺 Colmillo Blanco tiene <b>29% de proteína total</b>, con el <b>85% de origen animal</b> — carne de vacuno como primer ingrediente. Multi-etapas (cachorro, adulto y senior). Nutrición Ancestral.'},
  {keys:['precio','cuánto cuesta','saco','comprar','dónde comprar','tienda'],resp:'🛒 Puedes encontrar Colmillo Blanco en pet shops y veterinarias de todo Chile. ¿En qué ciudad estás? Te muestro el mapa con los puntos de venta más cercanos.'},
];
function getFAQResponse(text){
  const t=text.toLowerCase();
  return FAQ.find(f=>f.keys.some(k=>t.includes(k)))?.resp||null;
}

// ── ESTADO ────────────────────────────────────────────────────────────────
let S={step:'welcome',dog:{},user:{},hist:[],contactType:'email'};
const chatEl=()=>document.getElementById('chat');
const scroll=()=>setTimeout(()=>chatEl().scrollTop=chatEl().scrollHeight,60);

function addMsg(role,html){
  const d=document.createElement('div');d.className=`msg ${role}`;
  if(role==='bot')d.innerHTML=`<div class="av">🐺</div><div class="bubble">${html}</div>`;
  else d.innerHTML=`<div class="bubble">${html}</div>`;
  chatEl().appendChild(d);scroll();return d;
}
function addMsgWithCard(role,html,breed){
  addMsg(role,html);
  if(breed){const wrap=document.createElement('div');wrap.style.paddingLeft='34px';showRazaCard(breed,wrap);chatEl().appendChild(wrap);}
}
function showRazaCard(breed,container){
  const info=getRazaInfo(breed);if(!info)return;
  const div=document.createElement('div');div.className='raza-card';
  div.innerHTML=`
    <div class="raza-title">🐕 ${breed}</div>
    <div class="raza-grid">
      <div class="raza-item"><div class="ri-label">Tamaño</div><div class="ri-val">${info.tam}</div></div>
      <div class="raza-item"><div class="ri-label">Peso típico</div><div class="ri-val">${info.peso}</div></div>
      <div class="raza-item"><div class="ri-label">Energía</div><div class="ri-val">${info.energia}</div></div>
      <div class="raza-item"><div class="ri-label">Vida promedio</div><div class="ri-val">${info.vida}</div></div>
    </div>
    <div class="raza-tip">💡 <b>Consejo Colmillo Blanco:</b> ${info.tip}</div>`;
  container.appendChild(div);scroll();
}
function showTyping(){
  const d=document.createElement('div');d.className='msg bot';d.id='typ';
  d.innerHTML=`<div class="av">🐺</div><div class="typing"><span></span><span></span><span></span></div>`;
  chatEl().appendChild(d);scroll();
}
function hideTyping(){const t=document.getElementById('typ');if(t)t.remove();}
function setQR(opts){
  const el=document.getElementById('qrs');el.innerHTML='';
  if(!opts||!opts.length){el.classList.add('hidden');return;}
  el.classList.remove('hidden');
  opts.forEach(o=>{
    const b=document.createElement('button');b.className='qr';b.textContent=o;
    b.onclick=()=>{el.classList.add('hidden');handleChoice(o);};
    el.appendChild(b);
  });
}

function showResult(dog,calc){
  const fc=document.getElementById('fc');fc.classList.remove('hidden');fc.innerHTML='';
  let pt='';
  if(calc.cat==='cachorro'){const lb=['Destete–4m','4–8 meses','9–12 meses'];pt=` <span class="badge">${lb[getFase(dog.age)]}</span>`;}
  const actLabel=dog.activity==='alta'?'Alta':dog.activity==='baja'?'Baja':'Normal';
  const div=document.createElement('div');div.className='result-card';
  div.innerHTML=`
    <div class="rc-title">📊 Perfil de ${dog.name||'tu perro'}${pt}</div>
    <div class="rrow"><span class="rlabel">Etapa</span><span class="rval">${calc.label}</span></div>
    ${dog.breed?`<div class="rrow"><span class="rlabel">Raza</span><span class="rval">${dog.breed}</span></div>`:''}
    <div class="rrow"><span class="rlabel">Peso</span><span class="rval">${dog.weight} kg</span></div>
    <div class="rrow"><span class="rlabel">Actividad</span><span class="rval">${actLabel}</span></div>
    <div class="rrow"><span class="rlabel">Porción diaria</span><span class="rval hi">${calc.dailyStr} gr/día</span></div>
    <div class="rrow"><span class="rlabel">Consumo mensual</span><span class="rval">${calc.monthly} gr</span></div>
    <div class="rrow"><span class="rlabel">Saco 20 kg dura</span><span class="rval hi">~${calc.bag20} días</span></div>`;
  fc.appendChild(div);
  const pd=document.createElement('div');pd.className='prod-card';
  pd.innerHTML=`<div class="prod-info"><h4>Colmillo Blanco 20 kg</h4><p>Nutrición Ancestral · Todas las etapas</p><div class="prod-badges"><span class="pbadge">85% proteína animal</span><span class="pbadge">29% proteína total</span><span class="pbadge">Multi-etapas</span></div></div>`;
  fc.appendChild(pd);scroll();
}

function showMap(){
  const fc=document.getElementById('fc');fc.classList.remove('hidden');
  const existing=document.getElementById('map-card-el');if(existing)existing.remove();
  const div=document.createElement('div');div.className='map-card';div.id='map-card-el';
  div.innerHTML=`
    <iframe src="${MAPS_URL}" allowfullscreen loading="lazy"></iframe>
    <div class="map-footer">📍 Puntos de venta Colmillo Blanco · <a href="${MAPS_FULL}" target="_blank">Ver mapa completo</a></div>`;
  fc.appendChild(div);scroll();
}

function showRegForm(){
  const name=S.dog.name||'tu perro';
  const fc=document.getElementById('fc');fc.classList.remove('hidden');
  const div=document.createElement('div');div.className='form-card';div.id='reg-form';
  div.innerHTML=`
    <div class="form-title">Guardar Perfil de ${name}</div>
    <div class="frow">
      <div class="ff"><label>Tu nombre</label><input id="fn" placeholder="Pedro"></div>
      <div class="ff"><label>Ciudad</label><input id="fc2" placeholder="Santiago"></div>
    </div>
    <div class="ff" style="margin-bottom:8px"><label>¿Cómo prefieres que te contactemos?</label></div>
    <div class="contact-options">
      <div class="contact-opt active" id="opt-email" onclick="selectContact('email')">
        <h5>📧 Email</h5><p>Reporte completo</p>
      </div>
      <div class="contact-opt" id="opt-whatsapp" onclick="selectContact('whatsapp')">
        <h5>💬 WhatsApp</h5><p>Tips semanales</p>
      </div>
    </div>
    <div id="contact-input" class="frow full">
      <div class="ff"><label id="contact-label">Email</label><input id="fcontact" type="email" placeholder="pedro@mail.com"></div>
    </div>
    <div class="frow full"><div class="ff"><label>¿Dónde compras alimento?</label>
      <select id="fs"><option value="">Selecciona...</option>
        <option>Pet shop del barrio</option><option>Petco / PetSmart</option>
        <option>Supermercado</option><option>Online</option><option>Veterinaria</option>
      </select></div></div>

function selectContact(type){
  S.contactType=type;
  document.getElementById('opt-email').classList.toggle('active',type==='email');
  document.getElementById('opt-whatsapp').classList.toggle('active',type==='whatsapp');
  const input=document.getElementById('fcontact');
  const label=document.getElementById('contact-label');
  if(type==='whatsapp'){
    input.type='tel';input.placeholder='+56 9 1234 5678';label.textContent='WhatsApp';
  }else{
    input.type='email';input.placeholder='pedro@mail.com';label.textContent='Email';
  }
}

function submitReg(){
  const name=document.getElementById('fn')?.value?.trim();
  const contact=document.getElementById('fcontact')?.value?.trim();
  const city=document.getElementById('fc2')?.value?.trim();
  const shop=document.getElementById('fs')?.value;
  if(!name||!contact){alert('Por favor ingresa tu nombre y '+( S.contactType==='whatsapp'?'WhatsApp':'email')+'.');return;}
  S.user={name,contact,contactType:S.contactType,city,shop};
  document.getElementById('fc').classList.add('hidden');
  const rec={fecha:new Date().toISOString(),nombre_usuario:name,
    [S.contactType]:contact,ciudad:city,lugar_compra:shop,
    nombre_perro:S.dog.name,raza:S.dog.breed,edad:S.dog.age,peso:S.dog.weight,
    actividad:S.dog.activity,porcion_diaria:S.dog.calc?.dailyStr,duracion_saco_20kg:S.dog.calc?.bag20};
  console.log('📦 REGISTRO COLMILLO BLANCO →',rec);
  const contactMsg=S.contactType==='whatsapp'?`te escribiremos por WhatsApp al <b>${contact}</b>`:`te enviaremos info a <b>${contact}</b>`;
  addMsg('bot',`¡Perfecto, ${name}! 🐾 El perfil de <b>${S.dog.name||'tu perro'}</b> quedó guardado y ${contactMsg}. ¡Bienvenido a la familia Colmillo Blanco!`);
  setQR(['Consejos de alimentación','¿Dónde comprar?','¿Qué no puede comer mi perro?']);
  S.step='done';
}

async function callBackend(text,imageData){
  const sys=`Eres el asistente experto en perros de Colmillo Blanco, marca chilena premium. Veterinario digital amigable. Español chileno natural. Respuestas cortas (3-4 oraciones max). NUNCA diagnostiques enfermedades ni recomiendes medicamentos. Para temas médicos serios: "consulta a tu veterinario". Menciona Colmillo Blanco naturalmente (29% proteína, 85% origen animal, Nutrición Ancestral). 1-2 emojis max. Perro: ${JSON.stringify(S.dog)}. Usuario: ${JSON.stringify(S.user)}.`;
  const body={system:sys};
  if(imageData){body.imageData=imageData;}
  else{body.messages=[...S.hist,{role:'user',content:text}];}
  try{
    const r=await fetch(BACKEND,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    const reply=d.reply||null;
    if(reply&&!imageData)S.hist.push({role:'user',content:text},{role:'assistant',content:reply});
    return reply;
  }catch(e){return null;}
}

async function handleChoice(choice){
  addMsg('user',choice);
  if(choice==='🔍 Conoce la raza de tu perro'){
    S.step='photo';
    addMsg('bot','¡Perfecto! Sube una foto de tu perro y te digo su raza, características y consejos específicos para él 📸');
    document.getElementById('upzone').classList.remove('hidden');
  }else if(choice==='🍽️ Calcular su alimento'){
    S.step='calc_w';
    const razaInfo=S.dog.breed?getRazaInfo(S.dog.breed):null;
    const pesoSug=razaInfo?razaInfo.peso:null;
    const msg=pesoSug&&pesoSug!=='Variable'
      ?`Vamos con la tabla oficial de Colmillo Blanco 📋 Para un <b>${S.dog.breed}</b> el peso típico es <b>${pesoSug}</b>. ¿Cuánto pesa exactamente tu perro en kilos?`
      :'Vamos con la tabla oficial de Colmillo Blanco 📋 ¿Cuánto pesa tu perro en kilos?';
    addMsg('bot',msg);
  }else if(choice==='💬 Hacer una consulta'){
    S.step='chat';addMsg('bot','¡Con gusto! ¿Qué quieres saber sobre tu perro? 🐕');
  }else if(choice==='Sí, guardar perfil'){
    document.getElementById('fc').classList.add('hidden');showRegForm();
  }else if(choice==='No por ahora'){
    S.step='chat';addMsg('bot','¡Sin problema! ¿En qué más te puedo ayudar?');
    setQR(['Consejos de alimentación','¿Dónde comprar?','Calcular de nuevo']);
  }else if(choice==='Calcular de nuevo'){
    S.step='calc_w';document.getElementById('fc').classList.add('hidden');
    addMsg('bot','¿Cuánto pesa tu perro en kilos?');
  }else if(choice==='¿Dónde comprar?'||choice==='Ver puntos de venta'){
    addMsg('bot','Aquí tienes el mapa con todos los puntos de venta de Colmillo Blanco en Chile 📍');
    showMap();S.step='chat';
  }else if(choice==='Saber más de su raza'){
    const info=getRazaInfo(S.dog.breed);
    if(info){addMsg('bot',`Todo sobre el <b>${S.dog.breed}</b>:`);const wrap=document.createElement('div');wrap.style.paddingLeft='34px';showRazaCard(S.dog.breed,wrap);chatEl().appendChild(wrap);}
    else{await processText('Cuéntame más sobre la raza de mi perro');}
  }else{await processText(choice);}
}

async function processText(text){
  // Detectar si pregunta por dónde comprar
  const tl=text.toLowerCase();
  if(tl.includes('dónde comprar')||tl.includes('donde comprar')||tl.includes('punto de venta')||tl.includes('tienda')){
    addMsg('bot','Aquí tienes el mapa con todos los puntos de venta de Colmillo Blanco en Chile 📍');
    showMap();S.step='chat';return;
  }

  if(S.step==='calc_w'){
    const w=parseFloat(text.replace(',','.'));
    if(isNaN(w)||w<0.5||w>120){
      const pesoSug=S.dog.breed?getRazaInfo(S.dog.breed)?.peso:null;
      const hint=pesoSug&&pesoSug!=='Variable'?` Para un ${S.dog.breed} lo típico es ${pesoSug}.`:'';
      addMsg('bot',`Ingresa el peso en kilos, ej: <b>12</b> o <b>4.5</b>.${hint}`);return;
    }
    S.dog.weight=w;S.step='calc_a';
    addMsg('bot',`${w} kg ✅ ¿Cuántos años tiene? (cachorros: ej <b>0.5</b> = 6 meses)`);return;
  }
  if(S.step==='calc_a'){
    const a=parseFloat(text.replace(',','.'));
    if(isNaN(a)||a<0||a>25){addMsg('bot','Ingresa la edad en años. Ej: <b>2</b> o <b>0.5</b>');return;}
    S.dog.age=a;S.step='calc_act';
    addMsg('bot','¿Cuál es el nivel de actividad de tu perro?');
    setQR(['🐢 Baja (duerme mucho)','🐕 Normal (paseos diarios)','⚡ Alta (muy activo)']);return;
  }
  if(S.step==='calc_act'){
    let act='normal';
    if(tl.includes('baja')||tl.includes('duerme')) act='baja';
    if(tl.includes('alta')||tl.includes('activo')) act='alta';
    S.dog.activity=act;
    const calc=calcFood(S.dog.weight,S.dog.age,act);S.dog.calc=calc;
    S.step='ask_name';
    document.getElementById('fc').classList.add('hidden');
    showResult(S.dog,calc);
    const tip=calc.cat==='cachorro'?'🐶 Divide la ración en <b>3–4 comidas</b> diarias.':calc.cat==='senior'?'👴 Cuida el peso de tu senior, clave para sus articulaciones.':'💡 Divide en <b>2 comidas</b> al día para mejor digestión.';
    addMsg('bot',`Listo! Según la tabla oficial de Colmillo Blanco: <b>${calc.dailyStr} gr/día</b> y un saco de 20 kg le dura <b>~${calc.bag20} días</b>.<br><br>${tip}<br><br>¿Cómo se llama tu perro?`);return;
  }
  if(S.step==='ask_name'){
    S.dog.name=text;S.step='offer_reg';
    // Reacción al nombre
    const reactions=['¡Qué lindo nombre!','¡Me encanta ese nombre!','¡Bonito nombre!','¡Qué original!'];
    const reaction=reactions[Math.floor(Math.random()*reactions.length)];
    addMsg('bot',`${reaction} <b>${text}</b> 🐾 ¿Quieres guardar su perfil y recibir recomendaciones personalizadas? Puedes elegir entre email o WhatsApp. Es completamente gratis.`);
    setQR(['Sí, guardar perfil','No por ahora']);return;
  }
  if(S.step==='store'){
    S.user.city=text;S.step='chat';
    addMsg('bot',`Aquí tienes los puntos de venta de Colmillo Blanco en Chile 📍`);
    showMap();return;
  }

  // FAQ sin IA
  const faqResp=getFAQResponse(text);
  if(faqResp){
    addMsg('bot',faqResp);
    if(!S.user.contact)setTimeout(()=>setQR(['Guardar perfil de mi perro','🍽️ Calcular su alimento','¿Dónde comprar?']),400);
    return;
  }

  // IA para el resto
  showTyping();
  const reply=await callBackend(text,null);
  hideTyping();
  addMsg('bot',reply||'No pude conectarme en este momento 🙏 Intenta de nuevo en unos segundos.');
  if(!S.user.contact)setTimeout(()=>setQR(['Guardar perfil de mi perro','🍽️ Calcular su alimento','¿Dónde comprar?']),400);
}

async function send(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();if(!text)return;
  inp.value='';setQR([]);addMsg('user',text);
  await processText(text);
}
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')send();});

document.getElementById('fileinput').addEventListener('change',async(e)=>{
  const file=e.target.files[0];if(!file)return;
  document.getElementById('upzone').classList.add('hidden');
  const reader=new FileReader();
  reader.onload=async(ev)=>{
    const dataUrl=ev.target.result;const b64=dataUrl.split(',')[1];
    const img=new Image();img.src=dataUrl;img.className='img-preview';
    const wrap=document.createElement('div');wrap.className='msg user';
    const bub=document.createElement('div');bub.className='bubble';bub.style.padding='6px';
    bub.appendChild(img);wrap.appendChild(bub);chatEl().appendChild(wrap);scroll();
    showTyping();
    const reply=await callBackend(null,{b64,type:file.type});
    hideTyping();
    if(reply){
      const m=reply.match(/\b(Labrador|Golden Retriever|Golden|Bulldog|Poodle|Husky|Beagle|Chihuahua|Pastor [A-Za-záéíóú]+|Dachshund|Schnauzer|Boxer|Shih[\s-]Tzu|Cocker|Pitbull|Rottweiler|Border Collie|Pomerania|Mestizo|mestizo|quiltro|Quiltro)\b/i);
      const breed=m?m[0]:null;
      if(breed)S.dog.breed=breed;
      S.step='calc_w';
      addMsgWithCard('bot',reply,breed);
      // Sugerir peso si conocemos la raza
      const info=breed?getRazaInfo(breed):null;
      const pesoMsg=info&&info.peso!=='Variable'?` Para un <b>${breed}</b> el peso típico es <b>${info.peso}</b>.`:'';
      setTimeout(()=>{
        if(pesoMsg) addMsg('bot',`💡${pesoMsg} ¿Quieres calcular cuánto debe comer?`);
        setQR(['🍽️ Calcular su alimento','Saber más de su raza']);
      },400);
    }else{
      addMsg('bot','No pude conectarme para analizar la foto 🙏 ¿Quieres calcular cuánto debe comer igual?');
      S.step='calc_w';setTimeout(()=>setQR(['🍽️ Calcular su alimento']),400);
    }
  };
  reader.readAsDataURL(file);
});
